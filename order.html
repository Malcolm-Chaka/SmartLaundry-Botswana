<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">
  <h2 class="text-center">Place an Order</h2>

  <form id="orderForm">
    <input class="form-control mb-3" placeholder="Full Name" required>
    <input class="form-control mb-3" placeholder="Phone Number" required>

    <select class="form-control mb-3">
      <option>Wash & Fold</option>
      <option>Wash & Iron</option>
      <option>Express</option>
    </select>

    <textarea class="form-control mb-3" placeholder="Address"></textarea>

    <button class="btn btn-dark w-100">Submit</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
