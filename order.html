<header class="page-header">
  <div class="container">
    <h1 class="display-4 fw-bold">Place Your Order</h1>
    <p class="lead">Quick Booking for a Stress-Free Laundry Day</p>
  </div>
</header>
<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-5">
        <h2 class="text-center mb-4">Place an Order</h2>
        <p class="text-center text-muted mb-4">Fill out the form below and we'll handle the rest.</p>
        
        <form id="orderForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter your full name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" placeholder="Enter your phone number" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Service Type</label>
            <select class="form-control" id="serviceSelect">
              <option>Wash & Fold</option>
              <option>Wash & Iron</option>
              <option>Express Service</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label">Pickup Address</label>
            <textarea class="form-control" rows="3" placeholder="Enter your address in Gaborone"></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label">Additional Instructions (optional)</label>
            <textarea class="form-control" rows="3" placeholder="Enter any additional instructions"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-3">Submit Order</button>
        </form>
      </div>
    </div>
  </div>
</section>
